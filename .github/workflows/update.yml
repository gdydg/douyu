name: 自动更新斗鱼直播源

# 触发条件
on:
  schedule:
    # 每天北京时间早上 6 点和下午 18 点自动运行 (UTC时间 22:00 和 10:00)
    - cron: '0 22,10 * * *'
  # 允许在 GitHub 网页端手动点击运行
  workflow_dispatch:

jobs:
  update-iptv:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 安装 Node.js (极其重要：execjs 需要它来执行斗鱼的加密 JS)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 安装 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4. 安装依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyExecJS

      # 5. 运行 Python 抓取脚本
      - name: Run script
        run: python main.py

      # 6. 将生成的 douyu.m3u 文件提交并推送到仓库
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add douyu.m3u
          # 如果文件没有变化，commit 会报错，所以加上 || exit 0 忽略错误
          git commit -m "Auto update Douyu IPTV sources" || exit 0
          git push
